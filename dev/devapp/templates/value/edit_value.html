{% extends 'base.html' %}

{% block title %} Values | Edit {% endblock %}

{% block content %}
<section class="customer-list-section">
    <div class="container">
        <div class="content">

            <div class="title-box">
                <div class="page-title">
                    <h3>Edit Value</h3>
                </div>
                <div class="breadcrumbs">
                    <ul class="breadcrumbs-list">
                        <li><a href="{% url 'dashboard' %}"><span><img src="/static/images/icons/Home.svg" alt="home"></span>Dashboard</a></li>
                        <li><a href="{% url 'value_list' %}">Value List</a></li>
                        <li><a href="#">Edit Value</a></li>
                    </ul>
                </div>
            </div>

            <div class="form-area-content">
                <div class="form-inner-content">

                    {% if messages %}
                    <div class="alert alert-info" style="color:red">
                        {% for message in messages %}<p>{{ message }}</p>{% endfor %}
                    </div>
                    {% endif %}

                    <form method="post" class="form-horizontal">
                        {% csrf_token %}

                        <div class="form-group">
                            <div class="input-field">
                                <label for="title">Title *</label>
                                <input type="text" name="title" id="title" value="{{ value.title }}" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-field">
                                <label for="icon">Icon <small style="color:#888">(e.g. fa fa-star)</small></label>
                                <input type="text" name="icon" id="icon" value="{{ value.icon }}">
                            </div>
                            <div class="input-field">
                                <label for="order_no">Order</label>
                                <input type="number" name="order_no" id="order_no" value="{{ value.order_no }}">
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-field-full">
                                <label for="description">Description *</label>
                                <textarea name="description" id="description" rows="5" required>{{ value.description }}</textarea>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="form-button">
                                <input type="submit" class="button blue-button" value="Update Value">
                                <a href="{% url 'value_list' %}" class="button primary-button cancle-button">Cancel</a>
                            </div>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</section>
{% endblock %}
