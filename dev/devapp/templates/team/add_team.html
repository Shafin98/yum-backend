{% extends 'base.html' %}

{% block title %} Add Team Member {% endblock %}

{% block content %}
<section class="customer-list-section">
    <div class="container">
        <div class="content">

            <div class="title-box">
                <div class="page-title">
                    <h3>Add Team Member</h3>
                </div>
                <div class="breadcrumbs">
                    <ul class="breadcrumbs-list">
                        <li><a href="{% url 'dashboard' %}">
                            <span><img src="/static/images/icons/Home.svg"></span>Dashboard</a></li>
                        <li><a href="{% url 'team_list' %}">Team List</a></li>
                        <li>Add Member</li>
                    </ul>
                </div>
            </div>

            <div class="form-area-content">
                <div class="form-inner-content">

                    <form method="post" enctype="multipart/form-data" class="form-horizontal">
                        {% csrf_token %}

                        <!-- Name -->
                        <div class="form-group">
                            <div class="input-field">
                                <label>Name*</label>
                                <input type="text" name="name" required>
                            </div>
                        </div>

                        <!-- Designation -->
                        <div class="form-group">
                            <div class="input-field">
                                <label>Designation*</label>
                                <input type="text" name="designation" required>
                            </div>
                        </div>

                        <!-- Image -->
                        <div class="form-group">
                            <div class="input-field">
                                <label>Image*</label>
                                <input type="file" name="image" accept="image/*" required>
                            </div>
                        </div>

                        <!-- Order -->
                        <div class="form-group">
                            <div class="input-field">
                                <label>Order</label>
                                <input type="number" name="order" placeholder="0">
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="form-group">
                            <div class="form-button">
                                <input type="submit" class="button blue-button" value="Save">
                                <a href="{% url 'team_list' %}" class="button primary-button cancle-button">Cancel</a>
                            </div>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</section>
{% endblock %}
